services:
  system-governor-mcp:
    build: .
    container_name: system-governor-mcp
    ports:
      - "8080:8080"
    volumes:
      # Persistent data: SQLite DB + generated reports
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - DB_PATH=/data/governor.db
      - REPORTS_DIR=/data/reports
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8080
      # Reminder threshold: minutes without sg_record_input before warning
      - REMINDER_THRESHOLD_MINUTES=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
